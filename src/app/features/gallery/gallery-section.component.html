<section class="gallery" id="galeria">
  <div class="container">
    <div class="section-header section-header--center" appReveal>
      <h2 class="section-title">Momentos en Café Raíces</h2>
      <p class="section-subtitle">Un lugar para quedarse un rato más.</p>
    </div>
  </div>

  <div class="gallery__strip" #galleryGrid>
    @for (img of images; track img.url) {
      <div class="gallery__slot" #galleryItem>
        <figure class="gallery__polaroid">
          <div class="gallery__photo">
            <img
              [src]="img.url"
              [alt]="img.alt"
              loading="lazy"
              width="600"
              height="750"
            >
          </div>
          <figcaption>{{ img.alt }}</figcaption>
        </figure>
      </div>
    }
  </div>

  <p class="gallery__hint" aria-hidden="true">Desliza para ver más →</p>
</section>
