<section class="menu-section" id="menu">
  <div class="container">
    <div class="section-header section-header--center" appReveal>
      <h2 class="section-title">Nuestro Menú</h2>
      <p class="section-subtitle">Todo hecho con ingredientes de temporada y mucho cariño.</p>
    </div>

    <div class="menu-filters" appReveal>
      @for (cat of categories; track cat) {
        <button
          class="menu-filter"
          [class.active]="activeCategory() === cat"
          (click)="setCategory(cat)"
        >
          {{ cat }}
        </button>
      }
    </div>

    <div class="menu-list" appReveal>
      @for (item of filteredItems(); track item.id) {
        <article class="menu-item" #menuItem>
          <div class="menu-item__head">
            <h3 class="menu-item__name">
              @if (item.tag) {
                <span
                  class="menu-item__dot"
                  [class]="'menu-item__dot--' + item.tag.toLowerCase()"
                  [title]="item.tag"
                ></span>
              }
              {{ item.name }}
            </h3>
            <span class="menu-item__leader" aria-hidden="true"></span>
            <span class="menu-item__price">${{ item.price }}</span>
          </div>
          <p class="menu-item__desc">{{ item.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
